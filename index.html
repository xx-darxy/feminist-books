<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>女性主义书籍时间线</title>
<style>
  :root {
    --purple: #7c5cbf;
    --purple-light: #f3f0ff;
    --purple-mid: #e0d7f5;
    --text: #2d2d2d;
    --text-light: #666;
    --border: #e0e0e0;
    --white: #ffffff;
    --bg: #fafafa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

 header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  justify-content: space-between; /* 左右两端对齐 */
  align-items: center; /* 垂直居中 */
  gap: 20px;
}

.header-left {
  flex-shrink: 0; /* 防止标题被挤压 */
}

.header-right {
  flex: 1; /* 让右侧占据剩余空间 */
  max-width: 600px; /* 限制文案最大宽度，避免太长 */
  text-align: right; /* 文案靠右对齐，如果你想靠左对齐这里改为 left */
}

.intro-text {
  font-size: 0.9em;
  color: var(--text-light);
  line-height: 1.5;
  margin: 0;
}

/* 新增控制区容器样式，整合搜索和筛选 */
.controls-container {
  background: var(--white);
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column; /* 垂直排列搜索和筛选 */
  gap: 16px;
}

.search-container {
  width: 100%;
}

.search-box {
  width: 100%;
  max-width: 400px; /* 控制搜索框宽度 */
  /* 保留你原有的 padding, border, border-radius 等样式 */
}

/* 调整原有筛选器样式，取消之前的 margin 等可能冲突的设定 */
.filters {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

  header h1 { font-size: 1.1em; color: var(--purple); white-space: nowrap; }

  .search-bar {
    flex: 1;
    min-width: 180px;
    max-width: 320px;
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 0.9em;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar:focus { border-color: var(--purple); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  select {
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-size: 0.85em;
    outline: none;
    background: var(--white);
    cursor: pointer;
  }
  select:focus { border-color: var(--purple); }

  .year-range { display: flex; align-items: center; gap: 5px; font-size: 0.85em; color: var(--text-light); }
  .year-range input {
    width: 66px; padding: 6px 8px;
    border: 1.5px solid var(--border); border-radius: 14px;
    font-size: 0.85em; outline: none; text-align: center;
  }
  .year-range input:focus { border-color: var(--purple); }

  .count { font-size: 0.82em; color: var(--text-light); white-space: nowrap; }

  /* 网站介绍 */
  .intro {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 32px 0;
  }
  .intro p {
    font-size: 0.92em;
    color: var(--text-light);
    line-height: 1.7;
    max-width: 640px;
  }

  .layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 20px 28px;
    gap: 28px;
  }

  .sidebar { width: 180px; flex-shrink: 0; }
  .sidebar-section { margin-bottom: 22px; }
  .sidebar-title {
    font-size: 0.72em; font-weight: 700; color: var(--text-light);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  }
  .chip-group { display: flex; flex-direction: column; gap: 5px; }
  .chip {
    padding: 5px 11px; border-radius: 12px; font-size: 0.82em;
    cursor: pointer; border: 1.5px solid var(--border);
    background: var(--white); color: var(--text); text-align: left;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--purple); color: var(--purple); }
  .chip.active { background: var(--purple); border-color: var(--purple); color: var(--white); }

  .timeline-wrap { flex: 1; min-width: 0; }
  .era-block { margin-bottom: 44px; }
  .era-label {
    font-size: 0.75em; font-weight: 700; color: var(--purple);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
  }
  .era-label::after { content: ''; flex: 1; height: 1px; background: var(--purple-mid); }

  .timeline {
    position: relative; padding-left: 22px;
    border-left: 2px solid var(--purple-mid);
    display: flex; flex-direction: column; gap: 12px;
  }

  .book-card {
    position: relative;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .book-card::before {
    content: ''; position: absolute; left: -27px; top: 18px;
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--purple); border: 2px solid var(--white);
    box-shadow: 0 0 0 2px var(--purple-mid);
  }
  .book-card:hover { box-shadow: 0 4px 16px rgba(124,92,191,0.12); border-color: var(--purple-mid); }

  .card-header {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .card-main { flex: 1; min-width: 0; }

  .book-year { font-size: 0.75em; font-weight: 700; color: var(--purple); margin-bottom: 3px; }
  .book-title { font-size: 0.97em; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }

  .book-meta { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 0.75em; padding: 2px 8px; border-radius: 9px;
    background: var(--purple-light); color: var(--purple);
  }
  .tag.nationality { background: #fff3e0; color: #e65100; }
  .tag.theme { background: #e8f5e9; color: #2e7d32; }

  .arrow-icon { font-size: 0.9em; color: var(--text-light); flex-shrink: 0; margin-top: 2px; }

  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--text-light); font-size: 0.95em;
  }

  .error-tip {
    background: #fff3e0; border: 1px solid #ffb74d;
    border-radius: 8px; padding: 14px 18px; margin-bottom: 20px;
    font-size: 0.88em; color: #e65100; display: none;
  }

  @media (max-width: 768px) {
    header { padding: 12px 14px; }
    .intro { padding: 18px 16px 0; }
    .layout { flex-direction: column; padding: 14px; }
    .sidebar { width: 100%; }
    .chip-group { flex-direction: row; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
    <div class="header-left">
    <div class="logo">📚 女性主义书籍</div>
  </div>
  <div class="header-right">
    <p class="intro-text">
      这是一个按时间线整理的女性主义书籍库，收录从十五世纪至今、不同国家和议题下的相关著作。<br>
      希望能帮助对这个领域感兴趣的人，找到值得阅读的下一本书。
    </p>
  </div>
</header>

<div class="controls-container">
  <div class="search-container">
    <input type="text" id="searchInput" class="search-box" placeholder="搜索书名、作者、描述...">
  </div>
  <div class="filters">
     <select id="filterNationality"><option value="">全部国籍</option></select>
    <select id="filterTheme"><option value="">全部主题</option></select>
    <div class="year-range">
      <input type="number" id="yearFrom" placeholder="从">
      <span>—</span>
      <input type="number" id="yearTo" placeholder="到">
    </div>
  </div>
  <span class="count" id="count"></span>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">浪潮</div>
      <div class="chip-group" id="waveChips"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">关键词</div>
      <div class="chip-group" id="keywordChips"></div>
    </div>
  </aside>

  <main class="timeline-wrap">
    <div class="error-tip" id="errorTip">⚠️ 无法加载书籍数据，请确认 books.json 文件存在。</div>
    <div id="content"></div>
  </main>
</div>

<script>
const WAVES = [
  { label: '第一波 1792–1920', from: 1792, to: 1920 },
  { label: '第二波 1960s–80s', from: 1960, to: 1989 },
  { label: '第三波 1990s–2000s', from: 1990, to: 2009 },
  { label: '第四波 2010s–', from: 2010, to: 2099 },
];

const KEYWORDS = [
  '女性选举权','生育权','身体自主','性别平等',
  '父权制','交叉性','劳动权','性暴力',
  '女性教育','网络女权','中国女性','MeToo',
];

const ERAS = [
  { label: '启蒙时期之前', from: 1300, to: 1699 },
  { label: '启蒙时期', from: 1700, to: 1849 },
  { label: '19世纪', from: 1850, to: 1919 },
  { label: '20世纪前期', from: 1920, to: 1959 },
  { label: '第二波', from: 1960, to: 1989 },
  { label: '第三波', from: 1990, to: 2009 },
  { label: '当代', from: 2010, to: 2099 },
];

let allBooks = [];
let activeKeyword = '';
let activeWaveChip = null;

function initChips() {
  const wc = document.getElementById('waveChips');
  WAVES.forEach(w => {
    const c = document.createElement('button');
    c.className = 'chip'; c.textContent = w.label;
    c.onclick = () => {
      const turningOn = !c.classList.contains('active');
      wc.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));

      if (turningOn) {
        c.classList.add('active');
        activeWaveChip = c;
        document.getElementById('yearFrom').value = w.from;
        document.getElementById('yearTo').value = w.to;
      } else {
        activeWaveChip = null;
        document.getElementById('yearFrom').value = '';
        document.getElementById('yearTo').value = '';
      }
      render();
    };
    wc.appendChild(c);
  });

  const kc = document.getElementById('keywordChips');
  KEYWORDS.forEach(k => {
    const c = document.createElement('button');
    c.className = 'chip'; c.textContent = k;
    c.onclick = () => {
      if (activeKeyword === k) {
        activeKeyword = '';
        c.classList.remove('active');
      } else {
        activeKeyword = k;
        kc.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
        c.classList.add('active');
      }
      render();
    };
    kc.appendChild(c);
  });
}

function populateSelects(books) {
  const nats   = [...new Set(books.map(b => b.nationality).filter(Boolean))].sort();
  const themes = [...new Set(books.map(b => b.theme).filter(Boolean))].sort();
  const ns = document.getElementById('filterNationality');
  const ts = document.getElementById('filterTheme');
  nats.forEach(n   => { const o = document.createElement('option'); o.value = n; o.textContent = n; ns.appendChild(o); });
  themes.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; ts.appendChild(o); });
}

function filter(books) {
  const q     = document.getElementById('search').value.trim().toLowerCase();
  const nat   = document.getElementById('filterNationality').value;
  const theme = document.getElementById('filterTheme').value;
  const yf    = parseInt(document.getElementById('yearFrom').value) || 0;
  const yt    = parseInt(document.getElementById('yearTo').value)   || 9999;

  return books.filter(b => {
    if (q && !`${b.title}${b.author}${b.description}${b.theme}`.toLowerCase().includes(q)) return false;
    if (nat   && b.nationality !== nat)   return false;
    if (theme && b.theme !== theme)       return false;
    if (b.year < yf || b.year > yt)       return false;
    if (activeKeyword && !`${b.title}${b.author}${b.description}${b.theme}${(b.tags||[]).join('')}`.toLowerCase().includes(activeKeyword.toLowerCase())) return false;
    return true;
  });
}

function render() {
  const books = filter(allBooks).sort((a, b) => a.year - b.year);
  document.getElementById('count').textContent = `${books.length} 本`;

  const content = document.getElementById('content');
  if (!books.length) { content.innerHTML = '<div class="empty">没有找到符合条件的书籍</div>'; return; }

  const groups = {};
  ERAS.forEach(e => { groups[e.label] = []; });
  books.forEach(b => {
    const era = ERAS.find(e => b.year >= e.from && b.year <= e.to);
    if (era) groups[era.label].push(b);
  });

  content.innerHTML = ERAS.filter(e => groups[e.label].length).map(e => `
    <div class="era-block">
      <div class="era-label">${e.label}</div>
      <div class="timeline">
        ${groups[e.label].map(bookCard).join('')}
      </div>
    </div>
  `).join('');
}

function bookCard(b) {
  return `
    <div class="book-card" onclick="goToDetail('${encodeURIComponent(b.title)}')">
      <div class="card-header">
        <div class="card-main">
          <div class="book-year">${b.year}</div>
          <div class="book-title">${b.title}</div>
          <div class="book-meta">
            <span class="tag">${b.author}</span>
            ${b.nationality ? `<span class="tag nationality">${b.nationality}</span>` : ''}
            ${b.theme ? `<span class="tag theme">${b.theme}</span>` : ''}
          </div>
        </div>
        <span class="arrow-icon">›</span>
      </div>
    </div>
  `;
}

function goToDetail(titleEncoded) {
  window.location.href = `book.html?title=${titleEncoded}`;
}

async function load() {
  try {
    const res = await fetch('books.json');
    if (!res.ok) throw new Error();
    allBooks = await res.json();
    populateSelects(allBooks);
    render();
  } catch {
    document.getElementById('errorTip').style.display = 'block';
    document.getElementById('content').innerHTML = '<div class="empty">请先添加书籍数据</div>';
  }
}

['search','filterNationality','filterTheme','yearFrom','yearTo'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});

initChips();
load();
</script>
</body>
</html>
