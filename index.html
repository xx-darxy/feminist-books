<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>女性主义书籍时间线</title>
<style>
  :root {
    --purple: #7c5cbf;
    --purple-light: #f3f0ff;
    --purple-mid: #e0d7f5;
    --text: #2d2d2d;
    --text-light: #666;
    --border: #e0e0e0;
    --white: #ffffff;
    --bg: #fafafa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 顶部 */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 1.2em;
    color: var(--purple);
    white-space: nowrap;
    margin-right: 8px;
  }

  .search-bar {
    flex: 1;
    min-width: 200px;
    max-width: 360px;
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 0.95em;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar:focus { border-color: var(--purple); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  select {
    padding: 7px 12px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    font-size: 0.88em;
    outline: none;
    background: var(--white);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  select:focus { border-color: var(--purple); }

  .year-range {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.88em;
    color: var(--text-light);
  }
  .year-range input {
    width: 72px;
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    font-size: 0.88em;
    outline: none;
    text-align: center;
  }
  .year-range input:focus { border-color: var(--purple); }

  .count {
    font-size: 0.85em;
    color: var(--text-light);
    white-space: nowrap;
  }

  /* 主体布局 */
  .layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
    gap: 32px;
  }

  /* 左侧关键词 */
  .sidebar {
    width: 200px;
    flex-shrink: 0;
  }

  .sidebar-section { margin-bottom: 24px; }

  .sidebar-title {
    font-size: 0.78em;
    font-weight: 600;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .chip-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .chip {
    padding: 6px 12px;
    border-radius: 14px;
    font-size: 0.85em;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--purple); color: var(--purple); }
  .chip.active {
    background: var(--purple);
    border-color: var(--purple);
    color: var(--white);
  }

  /* 时间线 */
  .timeline-wrap { flex: 1; min-width: 0; }

  .era-block { margin-bottom: 48px; }

  .era-label {
    font-size: 0.78em;
    font-weight: 700;
    color: var(--purple);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .era-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--purple-mid);
  }

  .timeline {
    position: relative;
    padding-left: 24px;
    border-left: 2px solid var(--purple-mid);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .book-card {
    position: relative;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    transition: box-shadow 0.2s, border-color 0.2s;
    cursor: default;
  }
  .book-card::before {
    content: '';
    position: absolute;
    left: -30px;
    top: 20px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--purple);
    border: 2px solid var(--white);
    box-shadow: 0 0 0 2px var(--purple-mid);
  }
  .book-card:hover {
    box-shadow: 0 4px 16px rgba(124,92,191,0.12);
    border-color: var(--purple-mid);
  }

  .book-year {
    font-size: 0.78em;
    font-weight: 700;
    color: var(--purple);
    margin-bottom: 4px;
  }

  .book-title {
    font-size: 1em;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .book-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }

  .tag {
    font-size: 0.78em;
    padding: 2px 9px;
    border-radius: 10px;
    background: var(--purple-light);
    color: var(--purple);
  }
  .tag.nationality { background: #fff3e0; color: #e65100; }
  .tag.theme { background: #e8f5e9; color: #2e7d32; }

  .book-desc {
    font-size: 0.88em;
    color: var(--text-light);
    line-height: 1.6;
    margin-top: 6px;
  }

  .book-footer {
    margin-top: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .zlib-btn {
    font-size: 0.8em;
    padding: 4px 12px;
    border-radius: 10px;
    background: var(--purple-light);
    color: var(--purple);
    text-decoration: none;
    border: 1px solid var(--purple-mid);
    transition: background 0.15s;
  }
  .zlib-btn:hover { background: var(--purple-mid); }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-light);
    font-size: 0.95em;
  }

  /* 加载错误提示 */
  .error-tip {
    background: #fff3e0;
    border: 1px solid #ffb74d;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 0.9em;
    color: #e65100;
    display: none;
  }

  @media (max-width: 768px) {
    header { padding: 14px 16px; }
    .layout { flex-direction: column; padding: 16px; }
    .sidebar { width: 100%; }
    .chip-group { flex-direction: row; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <h1>📚 女性主义书籍</h1>
  <input class="search-bar" type="text" id="search" placeholder="搜索书名、作者、描述…">
  <div class="filters">
    <select id="filterNationality">
      <option value="">全部国籍</option>
    </select>
    <select id="filterTheme">
      <option value="">全部主题</option>
    </select>
    <div class="year-range">
      <input type="number" id="yearFrom" placeholder="从">
      <span>—</span>
      <input type="number" id="yearTo" placeholder="到">
    </div>
  </div>
  <span class="count" id="count"></span>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">浪潮</div>
      <div class="chip-group" id="waveChips"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">关键词</div>
      <div class="chip-group" id="keywordChips"></div>
    </div>
  </aside>

  <main class="timeline-wrap">
    <div class="error-tip" id="errorTip">
      ⚠️ 无法加载书籍数据，请确认 books.json 文件存在。
    </div>
    <div id="content"></div>
  </main>
</div>

<script>
const WAVES = [
  { label: '第一波 1792–1920', from: 1792, to: 1920 },
  { label: '第二波 1960s–80s', from: 1960, to: 1989 },
  { label: '第三波 1990s–2000s', from: 1990, to: 2009 },
  { label: '第四波 2010s–', from: 2010, to: 2099 },
];

const KEYWORDS = [
  '女性选举权', '生育权', '身体自主', '性别平等',
  '父权制', '交叉性', '劳动权', '性暴力',
  '女性教育', '网络女权', '中国女性', 'MeToo',
];

const ERAS = [
  { label: '启蒙时期', from: 1700, to: 1849 },
  { label: '19世纪', from: 1850, to: 1919 },
  { label: '20世纪前期', from: 1920, to: 1959 },
  { label: '第二波', from: 1960, to: 1989 },
  { label: '第三波', from: 1990, to: 2009 },
  { label: '当代', from: 2010, to: 2099 },
];

let allBooks = [];
let activeKeyword = '';

// 初始化关键词芯片
function initChips() {
  const wc = document.getElementById('waveChips');
  WAVES.forEach(w => {
    const c = document.createElement('button');
    c.className = 'chip';
    c.textContent = w.label;
    c.onclick = () => {
      toggleChip(c, wc);
      document.getElementById('yearFrom').value = w.from;
      document.getElementById('yearTo').value = w.to;
      render();
    };
    wc.appendChild(c);
  });

  const kc = document.getElementById('keywordChips');
  KEYWORDS.forEach(k => {
    const c = document.createElement('button');
    c.className = 'chip';
    c.textContent = k;
    c.onclick = () => {
      if (activeKeyword === k) {
        activeKeyword = '';
        c.classList.remove('active');
      } else {
        activeKeyword = k;
        document.querySelectorAll('#keywordChips .chip').forEach(x => x.classList.remove('active'));
        c.classList.add('active');
      }
      render();
    };
    kc.appendChild(c);
  });
}

function toggleChip(el, parent) {
  const wasActive = el.classList.contains('active');
  parent.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if (!wasActive) el.classList.add('active');
  else {
    document.getElementById('yearFrom').value = '';
    document.getElementById('yearTo').value = '';
  }
}

// 填充下拉选项
function populateSelects(books) {
  const nats = [...new Set(books.map(b => b.nationality).filter(Boolean))].sort();
  const themes = [...new Set(books.map(b => b.theme).filter(Boolean))].sort();
  const ns = document.getElementById('filterNationality');
  const ts = document.getElementById('filterTheme');
  nats.forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = n; ns.appendChild(o); });
  themes.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; ts.appendChild(o); });
}

// 过滤
function filter(books) {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const nat = document.getElementById('filterNationality').value;
  const theme = document.getElementById('filterTheme').value;
  const yf = parseInt(document.getElementById('yearFrom').value) || 0;
  const yt = parseInt(document.getElementById('yearTo').value) || 9999;

  return books.filter(b => {
    if (q && !`${b.title}${b.author}${b.description}${b.theme}`.toLowerCase().includes(q)) return false;
    if (nat && b.nationality !== nat) return false;
    if (theme && b.theme !== theme) return false;
    if (b.year < yf || b.year > yt) return false;
    if (activeKeyword && !`${b.title}${b.author}${b.description}${b.theme}${b.tags||''}`.toLowerCase().includes(activeKeyword.toLowerCase())) return false;
    return true;
  });
}

// 渲染
function render() {
  const books = filter(allBooks).sort((a, b) => a.year - b.year);
  document.getElementById('count').textContent = `${books.length} 本`;

  const content = document.getElementById('content');
  if (!books.length) { content.innerHTML = '<div class="empty">没有找到符合条件的书籍</div>'; return; }

  // 按时代分组
  const groups = {};
  ERAS.forEach(e => { groups[e.label] = []; });
  books.forEach(b => {
    const era = ERAS.find(e => b.year >= e.from && b.year <= e.to);
    if (era) groups[era.label].push(b);
  });

  content.innerHTML = ERAS.filter(e => groups[e.label].length).map(e => `
    <div class="era-block">
      <div class="era-label">${e.label}</div>
      <div class="timeline">
        ${groups[e.label].map(bookCard).join('')}
      </div>
    </div>
  `).join('');
}

function bookCard(b) {
  const zlib = b.zlib ? `<a class="zlib-btn" href="${b.zlib}" target="_blank">📖 电子版</a>` : '';
  return `
    <div class="book-card">
      <div class="book-year">${b.year}</div>
      <div class="book-title">${b.title}</div>
      <div class="book-meta">
        <span class="tag">${b.author}</span>
        ${b.nationality ? `<span class="tag nationality">${b.nationality}</span>` : ''}
        ${b.theme ? `<span class="tag theme">${b.theme}</span>` : ''}
      </div>
      ${b.description ? `<div class="book-desc">${b.description}</div>` : ''}
      ${zlib ? `<div class="book-footer">${zlib}</div>` : ''}
    </div>
  `;
}

// 加载数据
async function load() {
  try {
    const res = await fetch('books.json');
    if (!res.ok) throw new Error();
    allBooks = await res.json();
    populateSelects(allBooks);
    render();
  } catch {
    document.getElementById('errorTip').style.display = 'block';
    document.getElementById('content').innerHTML = '<div class="empty">请先添加书籍数据</div>';
  }
}

// 事件绑定
['search','filterNationality','filterTheme','yearFrom','yearTo'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});

initChips();
load();
</script>
</body>
</html>
